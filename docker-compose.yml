services:
  # Serviço do banco de dados
  finanzen-db:
    image: postgres:15-alpine
    container_name: finanzen-postgres
    restart: always
    environment:
      POSTGRES_DB: finanzen_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Serviço de API
  finanzen-api:
    build: .
    container_name: finanzen-spring-api
    ports:
      - "8080:8080"
    depends_on:
      - finanzen-db
    environment:
      # Usando o serviço de banco de dados
      SPRING_DATASOURCE_URL: jdbc:postgresql://finanzen-db:5432/finanzen_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: password123
      API_SECURITY_TOKEN_SECRET: finanzen-secretkey

  # Kafka
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: finanzen-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFERS_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'

volumes:
  pgdata:
